server {
    listen  80;
    server_name x220-158-29-228.static.xvps.ne.jp;

    # Let's Encrypt 認証用
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # 初期設定時（証明書がない間）は、HTTPでフロントエンドを表示できるようにしておきます
    location / {
        root    /usr/share/nginx/html;
        index   index.html;
        try_files $uri $uri/ /index.html;
    }
}

