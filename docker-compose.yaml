services:
  frontend:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./frontend/default.conf:/etc/nginx/conf.d/default.conf:ro
  backend:
    build: ./backend/
    container_name: gobackend
    ports: 
      - 8080:8080
    depends_on:
      - postgredb
    environment:
      - DB_HOST=postgredb
  postgredb:
    image: postgres:14
    container_name: postgresdb
    ports:
      - 5432:5432
    volumes:
      - db-store:/var/lib/postgresql/data
      - ./script:/docker-entrypoint-initdb.d
    environment:
      - POSTGRES_PASSWORD=password
volumes:
  db-store: